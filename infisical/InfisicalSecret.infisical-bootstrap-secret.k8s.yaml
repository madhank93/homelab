apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: infisical-bootstrap-secret
  namespace: infisical
spec:
  authentication:
    kubernetesAuth:
      identityId: 47aef6c1-bdeb-40fa-be46-63bbcfe6a4df
      serviceAccountRef:
        name: infisical-opera-controller-manager
        namespace: infisical
  hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080
  managedSecretReference:
    creationPolicy: Orphan
    secretName: infisical-synced-secrets
    secretNamespace: infisical
  resyncInterval: 60
