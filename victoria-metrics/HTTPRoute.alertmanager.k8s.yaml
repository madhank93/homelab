apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: victoria-metrics
spec:
  hostnames:
    - alertmanager.madhan.app
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: kube-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: vmalertmanager-vm-stack
          port: 9093
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
