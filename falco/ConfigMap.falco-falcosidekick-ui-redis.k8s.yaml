apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: ui-redis
    app.kubernetes.io/instance: falco
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: falcosidekick
    app.kubernetes.io/part-of: falcosidekick
    app.kubernetes.io/version: 2.31.1
    helm.sh/chart: falcosidekick-0.12.1
  name: falco-falcosidekick-ui-redis
  namespace: falco
data:
  ping-redis.sh: |-
    #!/bin/bash
    for i in {1..10};
    do
      response=$(
        timeout -s 3 30 \
        redis-cli \
          -h falco-falcosidekick-ui-redis -p 6379 \
          ping
        )
      if [ "$response" = "PONG" ]; then
        exit 0
      fi
      sleep 3
    done
    exit 1
