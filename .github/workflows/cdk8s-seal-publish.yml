name: CDK8s Publish

on:
  push:
    branches:
      - main
      - 'v*'  # Trigger on release branches (v0.1.5, etc)
    paths:
      - 'workloads/**'
      - '.github/workflows/cdk8s-seal-publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: workloads/go.sum

      - name: Synthesize CDK8s manifests
        working-directory: workloads
        env:
          GOWORK: "off"
        run: |
          go mod download
          go run .
          ls -la ../app/

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.8.0
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Build Kubeflow manifests
        working-directory: workloads
        run: |
          kustomize build ai/kubeflow/ > ../app/kubeflow/kubeflow-manifests.yaml

      - name: Deploy Manifests to Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          publish_branch: ${{ github.ref_name }}-manifests
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: update kubernetes manifests [skip ci]'

      - name: Cleanup
        if: always()
        run: rm -rf app
