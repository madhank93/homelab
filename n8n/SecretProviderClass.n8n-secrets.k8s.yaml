apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  parameters:
    objects: |-
      - objectName: "DB_PASSWORD"
        secretPath: "secret/data/n8n"
        secretKey: "DB_PASSWORD"
    roleName: n8n
    vaultAddress: http://openbao.openbao.svc.cluster.local:8200
  provider: openbao
  secretObjects:
    - data:
        - key: DB_PASSWORD
          objectName: DB_PASSWORD
      secretName: n8n-db
      type: Opaque
