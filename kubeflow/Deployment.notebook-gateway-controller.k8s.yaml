apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  name: notebook-gateway-controller
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notebook-gateway-controller
  template:
    metadata:
      labels:
        app: notebook-gateway-controller
    spec:
      containers:
        - command:
            - python
            - /app/controller.py
          env:
            - name: HOME
              value: /tmp
          image: harbor.madhan.app/library/notebook-gateway-controller:v1
          name: controller
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /app
              name: script
      serviceAccountName: notebook-gateway-controller
      volumes:
        - configMap:
            name: notebook-gateway-controller-script
          name: script
