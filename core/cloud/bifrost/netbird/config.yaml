# NetBird v0.66 Combined Server Configuration
#
# ARCHITECTURE: The combined server ALWAYS runs embedded Dex OIDC internally.
#   auth.issuer MUST be the NetBird server's own /oauth2 URL — NEVER Authentik's URL.
#   Dashboard and CLI authenticate against embedded Dex (client ID = "netbird-dashboard").
#   Authentik is configured as an identity-provider CONNECTOR inside Dex, not as the issuer.
#
# POST-DEPLOY STEP (one-time):
#   1. Log in to https://netbird.madhan.app with local admin (email/password below)
#   2. Settings → Identity Providers → Add → Authentik
#      Client ID:     aumenijDycfG1cQURqH9BNJpV3KVUCoMHGPUVUlT
#      Client Secret: (from sops: NETBIRD_CLIENT_SECRET)
#      Issuer:        https://auth.madhan.app/application/o/netbird/
#      The redirect URI shown will be: https://netbird.madhan.app/oauth2/callback
#      → This is already pre-configured in Authentik via authentik.go.
#   3. Optional: set localAuthDisabled: true (only after step 2 is confirmed working)
#
# MIGRATION NOTE (first deploy with this config):
#   If netbird_data volume exists from a previous misconfigured run, reset it:
#     docker volume rm netbird_data
#   The volume is recreated automatically by bootstrap.sh.
#
# Secrets injected at runtime by bootstrap.sh (sed + Python substitution):
#   NB_RELAY_SECRET   — relay auth secret  (openssl rand -base64 32)
#   NB_DATA_STORE_KEY — datastore encryption key (openssl rand -base64 32)
#   NB_OWNER_HASH     — bcrypt hash of NB_OWNER_PASSWORD (generated by bootstrap.sh)

server:
  listenAddress: ":80"
  exposedAddress: "https://netbird.madhan.app:443"

  stunPorts:
    - 3478

  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"

  # Relay authentication secret — must match NB_RELAY_SECRET in agents
  authSecret: "${NB_RELAY_SECRET}"

  dataDir: "/var/lib/netbird"

  auth:
    # Embedded Dex issuer — the NetBird server's own /oauth2 path.
    # OIDC discovery: https://netbird.madhan.app/oauth2/.well-known/openid-configuration
    # Dashboard client ID is hardcoded to "netbird-dashboard" by the combined server.
    issuer: "https://netbird.madhan.app/oauth2"
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "https://netbird.madhan.app/nb-auth"
      - "https://netbird.madhan.app/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"
    # Initial local admin for first login.
    # After Authentik connector is working, set localAuthDisabled: true and remove this block.
    owner:
      email: "admin@madhan.app"
      password: "${NB_OWNER_HASH}"

  # Trust Traefik as the terminating reverse proxy (172.30.0.10 in bifrost_net)
  reverseProxy:
    trustedHTTPProxies:
      - "172.30.0.10/32"

  store:
    engine: "sqlite"
    encryptionKey: "${NB_DATA_STORE_KEY}"
