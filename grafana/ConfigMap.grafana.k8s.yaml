apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/version: 12.3.1
    helm.sh/chart: grafana-10.7.0
  name: grafana
  namespace: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - access: proxy
      isDefault: true
      jsonData:
        timeInterval: 30s
      name: VictoriaMetrics
      type: prometheus
      url: http://vmsingle-vm-stack.victoria-metrics.svc.cluster.local:8428
    - access: proxy
      jsonData:
        logsVolumeEnabled: false
      name: VictoriaLogs
      type: loki
      url: http://victoria-logs-victoria-logs-single-server.victoria-logs.svc.cluster.local:9428/select
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [auth]
    disable_login_form = false
    [auth.generic_oauth]
    allow_sign_up = true
    api_url = https://auth.madhan.app/application/o/userinfo/
    auth_url = https://auth.madhan.app/application/o/authorize/
    client_id = grafana-homelab
    enabled = true
    name = GitHub via Authentik
    role_attribute_path = contains(groups[*], 'grafana-admins') && 'Admin' || 'Viewer'
    scopes = openid email profile
    token_url = https://auth.madhan.app/application/o/token/
    use_pkce = true
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = ''
    root_url = https://grafana.madhan.app
    [unified_storage]
    index_path = /var/lib/grafana-search/bleve
